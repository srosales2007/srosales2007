<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="380" viewBox="0 0 1280 380" fill="none">
  <defs>
    <style>
      .bg { fill: #0B0A09; }
      .cream { fill: #DCC9A9; }
      .red { fill: #B83A2D; }
      .green { fill: #4E6851; }
      .stroke-cream { stroke: #DCC9A9; }
      .txt-dark {
        fill: #0B0A09;
        font-family: "Courier New", monospace;
        letter-spacing: 1px;
      }
      .txt {
        fill: #DCC9A9;
        font-family: "Courier New", monospace;
        letter-spacing: 1px;
      }
      .txt-soft {
        fill: #CDBA99;
        font-family: "Courier New", monospace;
        letter-spacing: 1px;
      }
      .pixel {
        shape-rendering: crispEdges;
        vector-effect: non-scaling-stroke;
      }
    </style>

    <!-- subtle scanlines -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#FFFFFF" opacity="0.018"/>
      <rect y="2" width="4" height="2" fill="#000000" opacity="0.025"/>
    </pattern>

    <!-- grid -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#DCC9A9" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>

    <!-- pixel noise -->
    <pattern id="noise" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect x="3" y="4" width="1" height="1" fill="#DCC9A9" opacity="0.08"/>
      <rect x="8" y="11" width="1" height="1" fill="#DCC9A9" opacity="0.05"/>
      <rect x="14" y="7" width="1" height="1" fill="#FFFFFF" opacity="0.04"/>
      <rect x="18" y="15" width="1" height="1" fill="#DCC9A9" opacity="0.06"/>
      <rect x="26" y="5" width="1" height="1" fill="#FFFFFF" opacity="0.03"/>
      <rect x="29" y="20" width="1" height="1" fill="#DCC9A9" opacity="0.07"/>
      <rect x="6" y="24" width="1" height="1" fill="#FFFFFF" opacity="0.03"/>
      <rect x="11" y="28" width="1" height="1" fill="#DCC9A9" opacity="0.05"/>
      <rect x="22" y="27" width="1" height="1" fill="#FFFFFF" opacity="0.04"/>
      <rect x="31" y="10" width="1" height="1" fill="#DCC9A9" opacity="0.06"/>
    </pattern>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="380" class="bg"/>
  <rect width="1280" height="380" fill="url(#grid)"/>
  <rect width="1280" height="380" fill="url(#noise)"/>
  <rect width="1280" height="380" fill="url(#scan)"/>

  <!-- outer frame -->
  <rect x="20" y="20" width="1240" height="340" fill="none" class="stroke-cream pixel" stroke-width="3"/>
  <rect x="28" y="28" width="1224" height="324" fill="none" class="stroke-cream pixel" stroke-opacity="0.22" stroke-width="1"/>

  <!-- top bar -->
  <rect x="20" y="20" width="1240" height="44" class="cream pixel"/>
  <text x="38" y="48" class="txt-dark" font-size="22" font-weight="700">PROFILE.DAT</text>
  <text x="1078" y="48" class="txt-dark" font-size="18" font-weight="700">SUBJECT 07</text>

  <!-- left ID card -->
  <rect x="42" y="86" width="170" height="232" class="green pixel" filter="url(#shadow)"/>
  <rect x="54" y="98" width="96" height="96" fill="#0B0A09" class="pixel" stroke="#DCC9A9" stroke-width="3"/>

  <!-- monitor icon -->
  <rect x="79" y="123" width="46" height="34" class="cream pixel"/>
  <rect x="87" y="131" width="30" height="18" class="bg pixel"/>
  <rect x="87" y="160" width="30" height="5" class="cream pixel"/>
  <rect x="75" y="165" width="54" height="5" class="cream pixel"/>

  <text x="60" y="238" class="txt-dark" font-size="60" font-weight="700">01</text>
  <text x="60" y="270" class="txt-dark" font-size="15" font-weight="700">DEV PROFILE</text>
  <text x="60" y="292" class="txt-dark" font-size="15" font-weight="700">ACTIVE BUILD</text>

  <!-- center name block -->
  <rect x="236" y="86" width="690" height="96" class="cream pixel" filter="url(#shadow)"/>
  <text x="262" y="124" class="txt-dark" font-size="26" font-weight="700">SANTIAGO ROSALES</text>
  <text x="264" y="152" class="txt-dark" font-size="16" font-weight="700">SOFTWARE DEVELOPMENT STUDENT</text>
  <text x="264" y="172" class="txt-dark" font-size="13" font-weight="700">FULL-STACK · AUTOMATION · PRACTICAL SOFTWARE</text>

  <!-- right handle card -->
  <rect x="946" y="86" width="292" height="96" class="red pixel" filter="url(#shadow)"/>
  <text x="968" y="116" class="txt-dark" font-size="14" font-weight="700">GITHUB</text>
  <text x="968" y="142" class="txt-dark" font-size="24" font-weight="700">@srosales2007</text>
  <text x="968" y="164" class="txt-dark" font-size="12" font-weight="700">PUBLIC WORK IN PROGRESS</text>

  <!-- row 2 -->
  <!-- focus -->
  <rect x="236" y="202" width="486" height="58" fill="none" opacity="0"/>
  <rect x="236" y="202" width="126" height="58" class="green pixel"/>
  <rect x="236" y="202" width="486" height="58" fill="none" class="stroke-cream pixel" stroke-width="3"/>
  <line x1="362" y1="202" x2="362" y2="260" class="stroke-cream pixel" stroke-width="3"/>
  <text x="258" y="236" class="txt-dark" font-size="15" font-weight="700">FOCUS</text>
  <text x="380" y="228" class="txt" font-size="14" font-weight="700">FULL-STACK DEVELOPMENT</text>
  <text x="380" y="248" class="txt" font-size="14" font-weight="700">AUTOMATION · PRODUCT THINKING</text>

  <!-- status -->
  <rect x="740" y="202" width="126" height="58" class="red pixel"/>
  <rect x="740" y="202" width="498" height="58" fill="none" class="stroke-cream pixel" stroke-width="3"/>
  <line x1="866" y1="202" x2="866" y2="260" class="stroke-cream pixel" stroke-width="3"/>
  <text x="766" y="236" class="txt-dark" font-size="15" font-weight="700">STATUS</text>
  <text x="884" y="228" class="txt" font-size="14" font-weight="700">BUILDING PRACTICAL SOFTWARE</text>
  <text x="884" y="248" class="txt" font-size="14" font-weight="700">UNIVERSIDAD FIDELITAS</text>

  <!-- row 3 -->
  <!-- stack -->
  <rect x="236" y="276" width="126" height="42" class="cream pixel"/>
  <rect x="236" y="276" width="486" height="42" fill="none" class="stroke-cream pixel" stroke-width="3"/>
  <line x1="362" y1="276" x2="362" y2="318" class="stroke-cream pixel" stroke-width="3"/>
  <text x="271" y="302" class="txt-dark" font-size="15" font-weight="700">STACK</text>
  <text x="380" y="302" class="txt" font-size="14" font-weight="700">REACT · NEXT.JS · JAVA · NODE · SQL</text>

  <!-- links -->
  <rect x="740" y="276" width="126" height="42" class="green pixel"/>
  <rect x="740" y="276" width="498" height="42" fill="none" class="stroke-cream pixel" stroke-width="3"/>
  <line x1="866" y1="276" x2="866" y2="318" class="stroke-cream pixel" stroke-width="3"/>
  <text x="777" y="302" class="txt-dark" font-size="15" font-weight="700">LINKS</text>
  <text x="884" y="302" class="txt" font-size="14" font-weight="700">LINKEDIN · EMAIL · PROJECTS</text>

  <!-- bottom strip -->
  <rect x="236" y="332" width="1002" height="14" fill="none"/>
  <text x="238" y="345" class="txt-soft" font-size="11" font-weight="700">BUILD LOG</text>

  <!-- tiny pixel histogram -->
  <!-- cream -->
  <rect x="334" y="338" width="7" height="6" class="cream pixel"/>
  <rect x="342" y="330" width="7" height="14" class="cream pixel"/>
  <rect x="350" y="322" width="7" height="24" class="cream pixel"/>
  <rect x="358" y="330" width="7" height="14" class="cream pixel"/>
  <rect x="366" y="338" width="7" height="6" class="cream pixel"/>

  <!-- green -->
  <rect x="410" y="338" width="7" height="6" class="green pixel"/>
  <rect x="418" y="328" width="7" height="16" class="green pixel"/>
  <rect x="426" y="316" width="7" height="24" class="green pixel"/>
  <rect x="434" y="328" width="7" height="16" class="green pixel"/>
  <rect x="442" y="338" width="7" height="6" class="green pixel"/>

  <!-- red -->
  <rect x="486" y="338" width="7" height="6" class="red pixel"/>
  <rect x="494" y="330" width="7" height="14" class="red pixel"/>
  <rect x="502" y="320" width="7" height="24" class="red pixel"/>
  <rect x="510" y="330" width="7" height="14" class="red pixel"/>
  <rect x="518" y="338" width="7" height="6" class="red pixel"/>

  <text x="566" y="345" class="txt-soft" font-size="11" font-weight="700">FULL-STACK BUILDS · AUTOMATION TOOLS · CLEAN EXECUTION</text>
</svg>
